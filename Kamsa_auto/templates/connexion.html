{% extends 'base.html' %}
{% load static %}

{% block content %}
{% if erreur %}
<p style="color:red">{{ erreur }}</p>
{% endif %}
<section class="page-section py-24 fade-in">
  <div class="max-w-4xl mx-auto px-6">
  <div class="max-w-md mx-auto bg-white p-10 border rounded-lg shadow-sm">
      <h2 class="text-2xl font-bold mb-8 text-center">Welcome Back</h2>
      <form class="space-y-4" method="post">
          {% csrf_token %}
          <input type="text" name="username" placeholder="Nom d'utilisateur" class="form-input">
          <input type="password" name="password" placeholder="Mot de passe" class="form-input">
          <button type="submit" class="w-full bg-brand-blue text-white py-3 rounded font-bold mt-4">Se connecter</button>
          <p class="text-center text-sm text-gray-500 mt-4">Pas encore de compte ? <a href="{% url "inscription" %}" class="text-brand-green">Creer</a></p>
      </form>
  </div>
</div>
</section>
   

{% endblock %}
