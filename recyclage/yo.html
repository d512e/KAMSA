<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMSA Auto</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    color:#111827;
}

/* NAVBAR */
.navbar{
    background:white;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.logo span{
    color:#0f766e;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#111827;
    font-weight:500;
}

/* SECTION */
.container{
    padding:50px 60px;
}

.title{
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    color:gray;
    margin-bottom:40px;
}

/* FILTERS */
.filters{
    display:flex;
    gap:15px;
    margin-bottom:40px;
}

.filter-btn{
    padding:12px 24px;
    border-radius:30px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
}

.active{
    background:#0f172a;
    color:white;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.car-title{
    font-size:28px;
    margin-bottom:10px;
}

.car-info{
    display:flex;
    gap:20px;
    color:gray;
    margin-bottom:20px;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    font-size:32px;
    color:#065f46;
    font-weight:bold;
}

.price span{
    font-size:16px;
    color:gray;
}

.book-btn{
    background:#0f172a;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">KAMSA <span>AUTO</span></div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Vehicles</a>
        <a href="#">Booking</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container">

    <h1 class="title">Our Premium Fleet</h1>
    <p class="subtitle">
        Select from our curated range of world-class vehicles.
    </p>

    <!-- FILTERS -->
    <div class="filters">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Economy</button>
        <button class="filter-btn">SUV</button>
        <button class="filter-btn">Luxury</button>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=1200" alt="">
            <div class="card-content">
                <h2 class="car-title">Eco Hatchback</h2>

                <div class="car-info">
                    <span>Hybrid</span>
                    <span>Manual</span>
                    <span>5 Seats</span>
                </div>

                <div class="bottom">
                    <div class="price">
                        $45 <span>/ day</span>
                    </div>

                    <button class="book-btn">
                        BOOK NOW
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?q=80&w=1200" alt="">
            <div class="card-content">
                <h2 class="car-title">Mountain SUV</h2>

                <div class="car-info">
                    <span>Diesel</span>
                    <span>Automatic</span>
                    <span>7 Seats</span>
                </div>

                <div class="bottom">
                    <div class="price">
                        $85 <span>/ day</span>
                    </div>

                    <button class="book-btn">
                        BOOK NOW
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
